<!-- OPTION 1: Bold Banner with Animated Underline -->
<div class="feed-banner-v1">

        <span class="banner-text">Fresh essays & tools</span>
        <span class="banner-arrow">→</span>
    </a>
</div>

<style>
.feed-banner-v1 {
    margin: 2rem 0;
}

.feed-banner-v1 .banner-link {
    display: inline-flex;

    gap: 1rem;
    padding: 1rem 2rem;
    background: linear-gradient(135deg, #faf6f1, #f5f0e8);
    border: 2px solid #d4a574;
    text-decoration: none;

    overflow: hidden;
}

.feed-banner-v1 .banner-link::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 3px;
    background: #c9a227;
    transition: width 0.3s ease;
}

.feed-banner-v1 .banner-link:hover::before {
    width: 100%;
}

.feed-banner-v1 .banner-link:hover {
    border-color: #c9a227;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(61, 40, 23, 0.1);
}

.feed-banner-v1 .banner-label {
    font-family: 'Roboto', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #5c3d1e;
    padding: 0.25rem 0.75rem;
    background: #f4d03f;
}

.feed-banner-v1 .banner-text {

    font-weight: 300;
    color: #3d2817;
    letter-spacing: 0.02em;
}

.feed-banner-v1 .banner-arrow {
    font-size: 1.25rem;
    color: #d4a574;
    transition: transform 0.3s ease;
}

.feed-banner-v1 .banner-link:hover .banner-arrow {
    transform: translateX(4px);
    color: #c9a227;
}
</style>
