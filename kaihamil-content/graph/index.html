<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph | Kai Hamil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-card: #1a1a1d;
            --border: #2a2a2d;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --system: #58a6ff;
            --self: #f97583;
            --both: #a371f7;
            --meta: #8b949e;
            --root: #f4d03f;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--root);
        }

        .logo span {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--root);
            background: var(--bg-secondary);
        }

        .btn.active {
            border-color: var(--root);
            background: rgba(244, 208, 63, 0.1);
        }

        /* Graph container */
        #graph-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        /* Node labels */
        .node-label {
            font-size: 11px;
            fill: var(--text-secondary);
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .node-label.root,
        .node-label.paradigm {
            font-size: 14px;
            font-weight: 600;
            fill: var(--text-primary);
        }

        .node-label.collection {
            font-size: 12px;
            font-weight: 500;
        }

        /* Info panel */
        .info-panel {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 320px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            z-index: 100;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .info-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .info-panel h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .info-panel .branch-tag {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .info-panel .branch-tag.system {
            background: rgba(88, 166, 255, 0.2);
            color: var(--system);
        }

        .info-panel .branch-tag.self {
            background: rgba(249, 117, 131, 0.2);
            color: var(--self);
        }

        .info-panel .branch-tag.both {
            background: rgba(163, 113, 247, 0.2);
            color: var(--both);
        }

        .info-panel .branch-tag.meta {
            background: rgba(139, 148, 158, 0.2);
            color: var(--meta);
        }

        .info-panel .description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .info-panel .connections {
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .info-panel .connections h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .info-panel .connection-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .info-panel .connection {
            font-size: 0.8rem;
            padding: 4px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .info-panel .connection:hover {
            border-color: var(--root);
            background: var(--bg-card);
        }

        .info-panel .visit-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: var(--root);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        .info-panel .visit-btn:hover {
            filter: brightness(1.1);
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 80px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            z-index: 100;
        }

        .legend h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.system { background: var(--system); }
        .legend-dot.self { background: var(--self); }
        .legend-dot.both { background: var(--both); }
        .legend-dot.meta { background: var(--meta); }
        .legend-dot.root { background: var(--root); }

        /* Filter buttons */
        .filters {
            position: fixed;
            top: 80px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .filter-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            text-align: left;
        }

        .filter-btn:hover {
            border-color: var(--text-muted);
        }

        .filter-btn.active {
            border-color: var(--root);
            color: var(--text-primary);
        }

        .filter-btn .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Zoom controls */
        .zoom-controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            border-color: var(--root);
        }

        /* Links */
        .link {
            stroke-opacity: 0.4;
            stroke-width: 1px;
        }

        .link.contains { stroke: var(--text-muted); stroke-opacity: 0.3; }
        .link.related { stroke: var(--both); stroke-dasharray: 4,4; }
        .link.deepens { stroke: var(--system); }
        .link.applies { stroke: var(--meta); stroke-dasharray: 2,2; }
        .link.explores { stroke: var(--self); stroke-dasharray: 2,2; }
        .link.contrasts { stroke: var(--root); stroke-dasharray: 6,3; }
        .link.inspires { stroke: var(--both); stroke-dasharray: 4,4; }

        .link.highlight {
            stroke-opacity: 1;
            stroke-width: 2px;
        }

        /* Nodes */
        .node {
            cursor: pointer;
            transition: all 0.2s;
        }

        .node:hover circle {
            filter: brightness(1.3);
        }

        .node.dimmed circle {
            opacity: 0.2;
        }

        .node.dimmed .node-label {
            opacity: 0.2;
        }

        /* Instructions toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            z-index: 50;
            opacity: 1;
            transition: opacity 0.5s;
        }

        .toast.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">KAI HAMIL <span>/ Knowledge Graph</span></div>
        <div class="controls">
            <button class="btn" id="toggle-labels">Labels</button>
            <button class="btn" id="reset-view">Reset View</button>
            <a href="/" class="btn">← Home</a>
        </div>
    </header>

    <div id="graph-container">
        <svg id="graph"></svg>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">
            All Nodes
        </button>
        <button class="filter-btn" data-filter="system">
            <span class="dot" style="background: var(--system)"></span>System
        </button>
        <button class="filter-btn" data-filter="self">
            <span class="dot" style="background: var(--self)"></span>Self
        </button>
        <button class="filter-btn" data-filter="both">
            <span class="dot" style="background: var(--both)"></span>Both
        </button>
        <button class="filter-btn" data-filter="meta">
            <span class="dot" style="background: var(--meta)"></span>Operations
        </button>
    </div>

    <div class="legend">
        <h3>Branches</h3>
        <div class="legend-item"><div class="legend-dot root"></div> Entry</div>
        <div class="legend-item"><div class="legend-dot system"></div> System</div>
        <div class="legend-item"><div class="legend-dot self"></div> Self</div>
        <div class="legend-item"><div class="legend-dot both"></div> Both</div>
        <div class="legend-item"><div class="legend-dot meta"></div> Operations</div>
    </div>

    <div class="info-panel" id="info-panel">
        <h2 id="info-title">Node Title</h2>
        <span class="branch-tag system" id="info-branch">System</span>
        <p class="description" id="info-description">Description goes here.</p>
        <div class="connections">
            <h3>Connected to</h3>
            <div class="connection-list" id="info-connections"></div>
        </div>
        <a href="#" class="visit-btn" id="info-visit">Visit Page →</a>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-out">−</button>
        <button class="zoom-btn" id="zoom-fit">⊙</button>
    </div>

    <div class="toast" id="toast">
        Click a node to explore • Drag to pan • Scroll to zoom
    </div>

    <script>
        // Configuration
        const config = {
            colors: {
                system: '#58a6ff',
                self: '#f97583',
                both: '#a371f7',
                meta: '#8b949e',
                null: '#f4d03f'
            },
            nodeSize: {
                root: 35,
                paradigm: 28,
                collection: 18,
                content: 10
            }
        };

        // State
        let graphData = null;
        let simulation = null;
        let svg = null;
        let g = null;
        let zoom = null;
        let selectedNode = null;
        let showLabels = true;
        let currentFilter = 'all';

        // Load and render
        async function init() {
            try {
                const response = await fetch('/data/graph.json');
                graphData = await response.json();
                render();
                
                // Hide toast after 5 seconds
                setTimeout(() => {
                    document.getElementById('toast').classList.add('hidden');
                }, 5000);
            } catch (err) {
                console.error('Failed to load graph data:', err);
            }
        }

        function render() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            // Clear previous
            svg.selectAll('*').remove();

            // Create zoom behavior
            zoom = d3.zoom()
                .scaleExtent([0.2, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            // Main group for zoom/pan
            g = svg.append('g');

            // Arrow markers for directed edges
            svg.append('defs').selectAll('marker')
                .data(['contains', 'related', 'deepens', 'applies', 'explores', 'contrasts', 'inspires'])
                .join('marker')
                .attr('id', d => `arrow-${d}`)
                .attr('viewBox', '0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('fill', '#71717a')
                .attr('d', 'M0,-5L10,0L0,5');

            // Create simulation
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.edges)
                    .id(d => d.id)
                    .distance(d => {
                        if (d.type === 'contains') return 80;
                        if (d.type === 'related') return 150;
                        return 120;
                    })
                    .strength(d => {
                        if (d.type === 'contains') return 0.8;
                        return 0.3;
                    }))
                .force('charge', d3.forceManyBody()
                    .strength(d => {
                        if (d.type === 'root') return -800;
                        if (d.type === 'paradigm') return -600;
                        if (d.type === 'collection') return -400;
                        return -150;
                    }))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide()
                    .radius(d => config.nodeSize[d.type] + 20));

            // Links
            const link = g.append('g')
                .selectAll('line')
                .data(graphData.edges)
                .join('line')
                .attr('class', d => `link ${d.type}`)
                .attr('marker-end', d => `url(#arrow-${d.type})`);

            // Nodes
            const node = g.append('g')
                .selectAll('g')
                .data(graphData.nodes)
                .join('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('click', (event, d) => selectNode(d))
                .on('mouseover', (event, d) => highlightConnections(d))
                .on('mouseout', resetHighlight);

            // Node circles
            node.append('circle')
                .attr('r', d => config.nodeSize[d.type])
                .attr('fill', d => config.colors[d.branch] || config.colors.null)
                .attr('stroke', d => d.type === 'root' ? '#fff' : 'none')
                .attr('stroke-width', d => d.type === 'root' ? 3 : 0);

            // Node labels
            node.append('text')
                .attr('class', d => `node-label ${d.type}`)
                .attr('dy', d => config.nodeSize[d.type] + 14)
                .text(d => d.label);

            // Simulation tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });

            // Initial zoom to fit
            setTimeout(() => {
                zoomToFit();
            }, 1000);
        }

        function selectNode(d) {
            selectedNode = d;
            
            // Update info panel
            const panel = document.getElementById('info-panel');
            document.getElementById('info-title').textContent = d.label;
            document.getElementById('info-description').textContent = d.description || '';
            
            const branchTag = document.getElementById('info-branch');
            branchTag.textContent = d.branch || 'Entry';
            branchTag.className = `branch-tag ${d.branch || 'root'}`;
            
            // Get connections
            const connections = graphData.edges
                .filter(e => e.source.id === d.id || e.target.id === d.id)
                .map(e => e.source.id === d.id ? e.target : e.source);
            
            const connectionsEl = document.getElementById('info-connections');
            connectionsEl.innerHTML = connections
                .slice(0, 8)
                .map(c => `<span class="connection" onclick="navigateToNode('${c.id}')">${c.label}</span>`)
                .join('');
            
            // Visit button
            const visitBtn = document.getElementById('info-visit');
            if (d.url && d.type === 'content') {
                visitBtn.href = d.url;
                visitBtn.style.display = 'block';
            } else {
                visitBtn.style.display = 'none';
            }
            
            panel.classList.add('visible');
            
            // Center on node
            centerOnNode(d);
        }

        function navigateToNode(nodeId) {
            const node = graphData.nodes.find(n => n.id === nodeId);
            if (node) {
                selectNode(node);
            }
        }

        function highlightConnections(d) {
            const connectedIds = new Set([d.id]);
            graphData.edges.forEach(e => {
                if (e.source.id === d.id) connectedIds.add(e.target.id);
                if (e.target.id === d.id) connectedIds.add(e.source.id);
            });

            d3.selectAll('.node')
                .classed('dimmed', n => !connectedIds.has(n.id));
            
            d3.selectAll('.link')
                .classed('highlight', e => e.source.id === d.id || e.target.id === d.id);
        }

        function resetHighlight() {
            d3.selectAll('.node').classed('dimmed', false);
            d3.selectAll('.link').classed('highlight', false);
        }

        function centerOnNode(d) {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const scale = 1.5;
            const x = width / 2 - d.x * scale;
            const y = height / 2 - d.y * scale;
            
            svg.transition()
                .duration(500)
                .call(zoom.transform, d3.zoomIdentity.translate(x, y).scale(scale));
        }

        function zoomToFit() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const bounds = g.node().getBBox();
            const fullWidth = bounds.width;
            const fullHeight = bounds.height;
            const midX = bounds.x + fullWidth / 2;
            const midY = bounds.y + fullHeight / 2;
            
            const scale = 0.85 / Math.max(fullWidth / width, fullHeight / height);
            const translate = [width / 2 - scale * midX, height / 2 - scale * midY];
            
            svg.transition()
                .duration(500)
                .call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
        }

        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Controls
        document.getElementById('toggle-labels').addEventListener('click', () => {
            showLabels = !showLabels;
            d3.selectAll('.node-label').style('display', showLabels ? 'block' : 'none');
            document.getElementById('toggle-labels').classList.toggle('active', showLabels);
        });

        document.getElementById('reset-view').addEventListener('click', () => {
            zoomToFit();
            document.getElementById('info-panel').classList.remove('visible');
            selectedNode = null;
        });

        document.getElementById('zoom-in').addEventListener('click', () => {
            svg.transition().call(zoom.scaleBy, 1.3);
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            svg.transition().call(zoom.scaleBy, 0.7);
        });

        document.getElementById('zoom-fit').addEventListener('click', zoomToFit);

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                
                d3.selectAll('.node').style('opacity', d => {
                    if (currentFilter === 'all') return 1;
                    if (d.branch === currentFilter) return 1;
                    if (d.type === 'root' || d.type === 'paradigm') return 0.7;
                    return 0.1;
                });
                
                d3.selectAll('.link').style('opacity', e => {
                    if (currentFilter === 'all') return 0.4;
                    const sourceMatch = e.source.branch === currentFilter;
                    const targetMatch = e.target.branch === currentFilter;
                    if (sourceMatch || targetMatch) return 0.6;
                    return 0.05;
                });
            });
        });

        // Handle resize
        window.addEventListener('resize', () => {
            if (graphData) {
                const container = document.getElementById('graph-container');
                svg.attr('width', container.clientWidth)
                   .attr('height', container.clientHeight);
                simulation.force('center', d3.forceCenter(container.clientWidth / 2, container.clientHeight / 2));
                simulation.alpha(0.3).restart();
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
