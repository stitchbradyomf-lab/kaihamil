[build]
  publish = "."
  command = "npm install @netlify/functions @netlify/blobs"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[[edge_functions]]
  path = "/*"
  function = "router"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Identity configuration
[context.production.environment]
  NETLIFY_IDENTITY_URL = "https://kaihamil.com/.netlify/identity"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Groove Pal domain routing
[[redirects]]
  from = "/"
  to = "/products/groove-pal/index.html"
  status = 200
  force = true
  conditions = {Host = ["groovepal.com", "www.groovepal.com"]}

[[redirects]]
  from = "/*"
  to = "/products/groove-pal/:splat"
  status = 200
  force = true
  conditions = {Host = ["groovepal.com", "www.groovepal.com"]}

# Valé subdomain - specific pages first
[[redirects]]
  from = "/setup"
  to = "/vale/setup.html"
  status = 200
  force = true
  conditions = {Host = ["vale.kaihamil.com"]}

[[redirects]]
  from = "/pricing"
  to = "/vale/pricing.html"
  status = 200
  force = true
  conditions = {Host = ["vale.kaihamil.com"]}

[[redirects]]
  from = "/capabilities"
  to = "/vale/capabilities.html"
  status = 200
  force = true
  conditions = {Host = ["vale.kaihamil.com"]}

[[redirects]]
  from = "/thank-you"
  to = "/vale/thank-you.html"
  status = 200
  force = true
  conditions = {Host = ["vale.kaihamil.com"]}

# Valé subdomain - root goes to index
[[redirects]]
  from = "/"
  to = "/vale/index.html"
  status = 200
  force = true
  conditions = {Host = ["vale.kaihamil.com"]}

# Valé subdomain - catch-all for any other paths
[[redirects]]
  from = "/*"
  to = "/vale/:splat"
  status = 200
  force = true
  conditions = {Host = ["vale.kaihamil.com"]}

# Redirects for protected routes
[[redirects]]
  from = "/private/*"
  to = "/private/index.html"
  status = 200
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/private/*"
  to = "/login.html"
  status = 302
