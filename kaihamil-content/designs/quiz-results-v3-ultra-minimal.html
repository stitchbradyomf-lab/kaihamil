<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results Design V3 — Ultra Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #faf6f1;
            --bg-card: #fffdf9;
            --brown-dark: #3d2817;
            --brown-medium: #6b5344;
            --amber: #d4a574;
            --gold: #c9a227;
            --border: #e8dfd3;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', -apple-system, sans-serif;
            background: var(--bg-cream);
            color: var(--brown-dark);
            line-height: 1.6;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Single Hero */
        .hero {
            text-align: center;
            padding: 40px 0;
        }
        
        .hero-icon {
            font-size: 5rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .hero-type {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--brown-medium);
        }
        
        /* Simple Position Indicator */
        .position-bar {
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin: 30px 0;
        }
        
        .position-label {
            font-size: 0.85rem;
            color: var(--brown-medium);
            text-align: center;
            margin-bottom: 15px;
        }
        
        /* Sliders showing position on each axis */
        .axis-display {
            margin-bottom: 20px;
        }
        
        .axis-display:last-child {
            margin-bottom: 0;
        }
        
        .axis-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--brown-medium);
            margin-bottom: 8px;
        }
        
        .axis-track {
            height: 8px;
            background: var(--bg-cream);
            border-radius: 4px;
            position: relative;
        }
        
        .axis-track::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -4px;
            bottom: -4px;
            width: 2px;
            background: var(--border);
            transform: translateX(-50%);
        }
        
        .axis-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: var(--gold);
            border: 2px solid var(--brown-dark);
            border-radius: 50%;
            z-index: 1;
        }
        
        /* One-liner insight */
        .insight {
            font-size: 1.1rem;
            text-align: center;
            color: var(--brown-dark);
            padding: 25px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 30px 0;
        }
        
        .insight em {
            color: var(--gold);
            font-style: normal;
            font-weight: 500;
        }
        
        /* Simple CTA */
        .cta {
            text-align: center;
            padding: 20px 0;
        }
        
        .cta-button {
            display: inline-block;
            background: var(--gold);
            color: var(--brown-dark);
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }
        
        .cta-note {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--brown-medium);
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: var(--brown-medium);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <span class="hero-icon">🔍</span>
            <div class="hero-type">The Explorer</div>
            <div class="hero-subtitle">Discovery-First AI User</div>
        </div>
        
        <!-- Position Sliders -->
        <div class="position-bar">
            <div class="position-label">Your Approach</div>
            
            <div class="axis-display">
                <div class="axis-labels">
                    <span>Inquisitive</span>
                    <span>Directive</span>
                </div>
                <div class="axis-track">
                    <div class="axis-marker" style="left: 25%;"></div>
                </div>
            </div>
            
            <div class="axis-display">
                <div class="axis-labels">
                    <span>Assistive</span>
                    <span>Execution</span>
                </div>
                <div class="axis-track">
                    <div class="axis-marker" style="left: 35%;"></div>
                </div>
            </div>
        </div>
        
        <!-- One-Liner -->
        <div class="insight">
            You <em>explore before committing</em>, treating AI as a conversation partner 
            for discovering what you don't know you don't know.
        </div>
        
        <!-- CTA -->
        <div class="cta">
            <a href="#" class="cta-button">Get Your Full Report</a>
            <div class="cta-note">8 questions • 5 minutes</div>
        </div>
        
        <footer>
            <p>Kai Hamil | System // Self</p>
        </footer>
    </div>
</body>
</html>
